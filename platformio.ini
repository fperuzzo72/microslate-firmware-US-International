[platformio]
default_envs = xteink_x3_x4

[env:xteink_x3_x4]
platform = espressif32 @ 6.12.0
board = esp32-c3-devkitm-1
framework = arduino, espidf

; Both the X3 (792x528) and X4 (800x480) use the same ESP32-C3 module and
; 16MB flash; the running binary picks the right panel/battery/LUT config
; at boot via freeink::selectXteinkDevice() (see HalGPIO::begin()).
board_upload.flash_size = 16MB
board_upload.maximum_size = 6553600
board_upload.offset_address = 0x10000

; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

; Build flags (matching CrossPoint) — shared by X3 and X4, selected at runtime
build_unflags =
  -std=gnu++11
  -Werror=int-in-bool-context

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
  -DCORE_DEBUG_LEVEL=0
  -DCONFIG_NIMBLE_CPP_IDF=1
  -DCONFIG_BT_NIMBLE_LEGACY_VHCI_ENABLE=1
  -DOMIT_FONTS=1
  -DRELEASE_BUILD
  ; Dual X3/X4 support via FreeInk SDK — both devices are compiled into one
  ; ESP32-C3 binary and selected at runtime by freeink::selectXteinkDevice()
  ; (see HalGPIO::begin()). Do not remove either flag — FreeInk's BoardConfig
  ; requires at least one and treats this as an X3+X4 dual build.
  -DFREEINK_DEVICE_X4=1
  -DFREEINK_DEVICE_X3=1
  -std=gnu++17

; Power management is configured in sdkconfig.defaults (CONFIG_PM_ENABLE,
; CONFIG_FREERTOS_USE_TICKLESS_IDLE, BLE modem sleep). These are compiled
; into ESP-IDF from source via framework = arduino, espidf.

; Monitor settings
monitor_port = COM5
monitor_speed = 115200
monitor_filters =
  esp32_exception_decoder

; Upload settings
upload_protocol = esptool
upload_speed = 115200
upload_port = COM5

; Libraries — esp-nimble-cpp replaces NimBLE-Arduino for ESP-IDF compatibility
;
; Hardware libs come from the FreeInk SDK (freeink-sdk/, added as a git
; submodule alongside this file) instead of the old lib/EInkDisplay,
; lib/BatteryMonitor, lib/InputManager, lib/SDCardManager. FreeInk is
; drop-in compatible with the original EInkDisplay/BatteryMonitor/etc APIs
; and adds runtime X3/X4 detection, per-device LUTs/SPI clock, and the
; BQ27220 gauge backend for X3 battery readings. See README-X3-PORT.md.
lib_deps =
  h2zero/esp-nimble-cpp@2.3.4
  BatteryMonitor=symlink://freeink-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://freeink-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://freeink-sdk/libs/display/FreeInkDisplay
  SDCardManager=symlink://freeink-sdk/libs/hardware/SDCardManager
  BoardConfig=symlink://freeink-sdk/libs/hardware/BoardConfig
  XteinkDetect=symlink://freeink-sdk/libs/hardware/XteinkDetect

; Check flags for code quality
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes
