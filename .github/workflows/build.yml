name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio/build
          key: pio-${{ hashFiles('platformio.ini', 'sdkconfig.defaults') }}
          restore-keys: pio-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Merge binaries
        run: |
          pip install esptool
          BOOT_APP0=$(find ~/.platformio -name "boot_app0.bin" | head -1)

          esptool.py --chip esp32c3 merge_bin \
            --flash_mode dio --flash_size 16MB \
            -o microslate-usi-${{ github.ref_name }}.bin \
            0x0     .pio/build/xteink_x4/bootloader.bin \
            0x8000  .pio/build/xteink_x4/partitions.bin \
            0xe000  "$BOOT_APP0" \
            0x10000 .pio/build/xteink_x4/firmware.bin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: microslate-usi-${{ github.ref_name }}.bin
          generate_release_notes: true
          body: |
            ## MicroSlate — US-International keyboard layout

            Firmware com suporte a dead keys para acentuação portuguesa:
            - `'` + vogal → acento agudo (á é í ó ú) / `'` + c → ç
            - `` ` `` + vogal → acento grave (à è ì ò ù)
            - `~` + a/o → til (ã õ)
            - `^` + vogal → circunflexo (â ê î ô û)
            - `"` + vogal → trema (ä ë ï ö ü)
