name: Build CrossInk Dual-Boot

on:
  workflow_dispatch:
    inputs:
      crossink_tag:
        description: 'Tag do CrossInk a compilar (ex: v1.3.4)'
        required: true
        default: 'v1.3.4'
      build_variant:
        description: 'Variante de fonte do CrossInk'
        required: true
        default: 'tiny'
        type: choice
        options:
          - tiny
          - teensy
          - xlarge

permissions:
  contents: write

jobs:
  build-crossink:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MicroSlate fork
        uses: actions/checkout@v4
        with:
          path: microslate

      - name: Checkout CrossInk na tag especificada
        uses: actions/checkout@v4
        with:
          repository: uxjulia/CrossInk
          ref: ${{ github.event.inputs.crossink_tag }}
          submodules: recursive
          path: crossink

      # -----------------------------------------------------------------------
      # Patches — cada script mexe em um arquivo do CrossInk. Ficam em
      # scripts/patch-crossink/ dentro deste repo (não do CrossInk) para que
      # o YAML deste workflow não precise embutir código Python multi-linha
      # (isso já causou um erro de sintaxe YAML numa versão anterior).
      # -----------------------------------------------------------------------
      - name: "Patch 1/4 — Criar OtaApps.h"
        run: python3 microslate/scripts/patch-crossink/01_create_otaapps_h.py

      - name: "Patch 2/4 — HomeActivity.h"
        run: python3 microslate/scripts/patch-crossink/02_patch_home_activity_h.py

      - name: "Patch 3/4 — HomeActivity.cpp"
        run: python3 microslate/scripts/patch-crossink/03_patch_home_activity_cpp.py

      - name: "Patch 4/4 — main.cpp"
        run: python3 microslate/scripts/patch-crossink/04_patch_main_cpp.py

      # -----------------------------------------------------------------------
      # Verificação
      # -----------------------------------------------------------------------
      - name: Verificar patch
        run: |
          set -e
          grep -q "g_otaAppCount" crossink/src/activities/home/HomeActivity.cpp \
            && echo "✅ HomeActivity.cpp: g_otaAppCount presente"
          grep -q "HomeMenuAction::OtaApp" crossink/src/activities/home/HomeActivity.cpp \
            && echo "✅ HomeActivity.cpp: OtaApp presente no enum e nos switches"
          grep -q "OtaApps.h" crossink/src/activities/home/HomeActivity.h \
            && echo "✅ HomeActivity.h: include OK"
          grep -q "registerOtaAppName" crossink/src/main.cpp \
            && echo "✅ main.cpp: registerOtaAppName presente"
          test -f crossink/src/OtaApps.h \
            && echo "✅ OtaApps.h: arquivo presente"

      # -----------------------------------------------------------------------
      # Build — CrossInk
      # -----------------------------------------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar PlatformIO
        run: pip install platformio esptool

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-crossink-${{ github.event.inputs.crossink_tag }}-${{ hashFiles('crossink/platformio.ini') }}
          restore-keys: pio-crossink-

      - name: Compilar CrossInk com dual-boot
        working-directory: crossink
        run: pio run -e ${{ github.event.inputs.build_variant }}

      # -----------------------------------------------------------------------
      # Build — MicroSlate (padrão desse repo, com o fix do OtaBootSwitch)
      # -----------------------------------------------------------------------
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            microslate/.pio/build
          key: pio-microslate-${{ hashFiles('microslate/platformio.ini', 'microslate/sdkconfig.defaults') }}
          restore-keys: pio-microslate-

      - name: Compilar MicroSlate
        working-directory: microslate
        run: pio run

      # -----------------------------------------------------------------------
      # Montar binários
      # -----------------------------------------------------------------------
      - name: Montar binários
        run: |
          BOOT_APP0=$(find ~/.platformio -name "boot_app0.bin" | head -1)
          TAG=${{ github.event.inputs.crossink_tag }}
          VARIANT=${{ github.event.inputs.build_variant }}

          CI_FW=crossink/.pio/build/${VARIANT}/firmware.bin
          CI_BOOT=crossink/.pio/build/${VARIANT}/bootloader.bin
          CI_PART=crossink/.pio/build/${VARIANT}/partitions.bin
          MS_FW=microslate/.pio/build/xteink_x4/firmware.bin
          MS_BOOT=microslate/.pio/build/xteink_x4/bootloader.bin
          MS_PART=microslate/.pio/build/xteink_x4/partitions.bin

          # 1) CrossInk standalone — instalação do zero, sem MicroSlate
          esptool.py --chip esp32c3 merge_bin \
            --flash_mode dio --flash_size 16MB \
            -o crossink-${TAG}-${VARIANT}-standalone-full.bin \
            0x0     "$CI_BOOT" \
            0x8000  "$CI_PART" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$CI_FW"

          # 2) MicroSlate standalone — instalação do zero, sem CrossInk
          esptool.py --chip esp32c3 merge_bin \
            --flash_mode dio --flash_size 16MB \
            -o microslate-standalone-full.bin \
            0x0     "$MS_BOOT" \
            0x8000  "$MS_PART" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$MS_FW"

          # 3) Dual-boot completo em um único arquivo — CrossInk no app0 (boot
          #    padrão, 0x10000) + MicroSlate no app1 (0x650000)
          esptool.py --chip esp32c3 merge_bin \
            --flash_mode dio --flash_size 16MB \
            -o dualboot-crossink-${TAG}-${VARIANT}-microslate-full.bin \
            0x0     "$CI_BOOT" \
            0x8000  "$CI_PART" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$CI_FW" \
            0x650000 "$MS_FW"

          # 4) Slot-only — para quem já tem dual-boot e quer atualizar só o CrossInk
          cp "$CI_FW" crossink-${TAG}-${VARIANT}-dualboot-slot-only.bin

          # 5) Slot-only — para quem já tem dual-boot e quer atualizar só o MicroSlate
          cp "$MS_FW" microslate-dualboot-slot-only.bin

      # -----------------------------------------------------------------------
      # Publicar release
      # -----------------------------------------------------------------------
      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: crossink-${{ github.event.inputs.crossink_tag }}-${{ github.event.inputs.build_variant }}-dualboot
          name: "CrossInk ${{ github.event.inputs.crossink_tag }} (${{ github.event.inputs.build_variant }}) + MicroSlate Dual-Boot"
          files: |
            crossink-${{ github.event.inputs.crossink_tag }}-${{ github.event.inputs.build_variant }}-standalone-full.bin
            microslate-standalone-full.bin
            dualboot-crossink-${{ github.event.inputs.crossink_tag }}-${{ github.event.inputs.build_variant }}-microslate-full.bin
            crossink-${{ github.event.inputs.crossink_tag }}-${{ github.event.inputs.build_variant }}-dualboot-slot-only.bin
            microslate-dualboot-slot-only.bin
          body: |
            ## CrossInk ${{ github.event.inputs.crossink_tag }} (${{ github.event.inputs.build_variant }}) + MicroSlate — Dual-Boot

            Compilado a partir do [CrossInk](https://github.com/uxjulia/CrossInk) oficial
            `${{ github.event.inputs.crossink_tag }}` com patch de dual-boot aplicado
            automaticamente em CI, mais o MicroSlate deste repositório (com o teclado
            US-International e o fix de troca de partição via `ota_boot::switchTo`).

            No menu principal do CrossInk aparece uma entrada **MicroSlate**; no menu do
            MicroSlate aparece uma entrada **CrossInk** — cada uma reinicia no outro app.

            ### Qual arquivo usar?

            | Situação | Arquivo | Endereço |
            |---|---|---|
            | Instalação do zero, dual-boot completo (recomendado) | `dualboot-crossink-*-microslate-full.bin` | `0x0` |
            | Instalação do zero, só CrossInk | `crossink-*-standalone-full.bin` | `0x0` |
            | Instalação do zero, só MicroSlate | `microslate-standalone-full.bin` | `0x0` |
            | Já tem dual-boot, atualizar só o CrossInk | `crossink-*-dualboot-slot-only.bin` | `0x10000` |
            | Já tem dual-boot, atualizar só o MicroSlate | `microslate-dualboot-slot-only.bin` | `0x650000` |

            ### Como gravar (browser)

            Acesse [esp.huhn.me](https://esp.huhn.me) no Chrome/Edge, conecte o X4,
            selecione o arquivo e informe o endereço correto.

            ### Como gravar (terminal)

            ```bash
            # Dual-boot completo, do zero
            esptool.py --chip esp32c3 --port COM5 --baud 460800 \
              write_flash 0x0 dualboot-crossink-*-microslate-full.bin

            # Atualizar só o CrossInk (dual-boot já instalado)
            esptool.py --chip esp32c3 --port COM5 --baud 460800 \
              write_flash 0x10000 crossink-*-dualboot-slot-only.bin

            # Atualizar só o MicroSlate (dual-boot já instalado)
            esptool.py --chip esp32c3 --port COM5 --baud 460800 \
              write_flash 0x650000 microslate-dualboot-slot-only.bin
            ```
